name: Articles CI

on:
  pull_request:
    branches:
      - main
      - release
    paths:
      - "public/articles/**"
      - "src/utils/validators/**"
      - ".github/workflows/articles-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate articles

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }} --depth=1 || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate article index
        run: yarn generate:index

      - name: Validate changed articles
        run: yarn validate:articles

      - name: Run tests
        run: yarn test

      - name: Print validation completion
        run: |
          echo ""
          echo "=========================================="
          echo "✅ Article Validation Completed"
          echo "=========================================="
          echo ""
          echo "📋 Results:"
          echo "  • Article index generation: PASSED"
          echo "  • Article validation: PASSED"
          echo "  • Tests: PASSED"
          echo ""

      - name: Sync article stats
        run: yarn sync:stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Print sync completion
        run: |
          echo ""
          echo "=========================================="
          echo "✅ Article Stats Sync Completed"
          echo "=========================================="
          echo ""
